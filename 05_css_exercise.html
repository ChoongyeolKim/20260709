<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="css/main.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nanum+Brush+Script&family=Nanum+Gothic&family=Noto+Sans+KR:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      html {
        font-size: 20px;
      }
      .div1 {
        border: 1pxsolidblack;
        font-size: 30px;
      }
      .p4 {
        font-size: 15px;
      }
      .p5 {
        font-size: 0.5em;
      }
      .p6 {
        font-size: 0.5rem;
      }
      .p7 {
        font-size: 50%;
      }
      .p8 {
        font-size: medium;
      }
    </style>
  </head>
  <body>
    <p class="p1">Times New Roman, 안녕하세요!</p>
    <p class="p2">Arial, 안녕하세요!</p>
    <p class="p3">Lucida Console, 안녕하세요!</p>
    <p class="noto-sans-kr">웹폰트(noto-sans-kr), 안녕하세요!</p>

    <div class="div1">
      저의 글자 크기는 30px입니다.
      <p class="p4">저의 글자 크기는 15px입니다.</p>
      <p class="p5">저의 글자 크기는 0.5em입니다.</p>
      <p class="p6">저의 글자 크기는 0.5rem입니다.</p>
      <p class="p7">저의 글자 크기는 50%입니다.</p>
      <p class="p8">저의 글자 크기는 medium입니다.</p>
    </div>
  </body>
</html>
